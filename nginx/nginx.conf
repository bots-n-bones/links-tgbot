events {}

http {
    upstream api_upstream {
        server api:8000;
    }

    upstream bot_upstream {
        server bot:8080;
    }

    server {
        listen 80;
        server_name _;

        # Webhook должен быть открыт для серверов Telegram — Basic Auth здесь недопустим.
        location /telegram/webhook {
            proxy_pass http://bot_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Healthcheck открыт для внешних мониторингов (uptime-роботы не шлют Basic Auth).
        location /health {
            proxy_pass http://api_upstream;
        }

        location / {
            auth_basic "Link Collector";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Когда появится домен: раскомментировать server{} на 443 с ssl_certificate
    # из /etc/letsencrypt (certbot), редиректить 80 -> 443 кроме /.well-known/acme-challenge.
    # См. README.md "Продакшен-деплой" за пошаговой инструкцией.
}
