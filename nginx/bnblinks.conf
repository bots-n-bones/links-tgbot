# Конфиг для системного nginx на общем сервере (НЕ для docker-compose —
# там уже есть другие проекты с занятыми портами 80/443). Устанавливается
# вручную в /etc/nginx/sites-available/, см. README.md "Продакшен-деплой".
#
# api контейнер публикует 127.0.0.1:8010, bot (webhook) — 127.0.0.1:8080
# (см. docker-compose.prod.yml).

upstream bnblinks_api {
    server 127.0.0.1:8010;
}

upstream bnblinks_bot {
    server 127.0.0.1:8080;
}

server {
    listen 443 ssl;
    server_name bnblinks.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/bnblinks.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bnblinks.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Webhook должен быть открыт для серверов Telegram — Basic Auth здесь недопустим.
    location /telegram/webhook {
        proxy_pass http://bnblinks_bot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthcheck открыт для внешних мониторингов (uptime-роботы не шлют Basic Auth).
    location /health {
        proxy_pass http://bnblinks_api;
    }

    # Доступ — только через Telegram Login Widget внутри приложения (см.
    # api/deps.py::get_current_workspace_id) — Basic Auth снят, дублировал
    # этот же контроль доступа отдельным, менее удобным паролем.
    location / {
        proxy_pass http://bnblinks_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
