services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: linkcollector
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d linkcollector"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      # .env содержит DATABASE_URL/REDIS_URL для запуска с хоста (localhost);
      # внутри Compose-сети сервисы адресуются по имени — переопределяем.
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/linkcollector
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build: .
    command: celery -A worker.tasks worker --loglevel=info
    env_file: .env
    environment:
      # .env содержит DATABASE_URL/REDIS_URL для запуска с хоста (localhost);
      # внутри Compose-сети сервисы адресуются по имени — переопределяем.
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/linkcollector
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A worker.tasks beat --loglevel=info
    env_file: .env
    environment:
      # .env содержит DATABASE_URL/REDIS_URL для запуска с хоста (localhost);
      # внутри Compose-сети сервисы адресуются по имени — переопределяем.
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/linkcollector
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build: .
    command: python -m bot.main
    env_file: .env
    environment:
      # .env содержит DATABASE_URL/REDIS_URL для запуска с хоста (localhost);
      # внутри Compose-сети сервисы адресуются по имени — переопределяем.
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/linkcollector
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
