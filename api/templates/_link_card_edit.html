<div class="card" id="link-{{ link.id }}">
  <form class="edit-form" hx-patch="/api/links/{{ link.id }}" hx-target="#link-{{ link.id }}" hx-swap="outerHTML">
    <label for="edit-title-{{ link.id }}">Заголовок</label>
    <input type="text" id="edit-title-{{ link.id }}" name="title" value="{{ link.title or '' }}">

    <label for="edit-description-{{ link.id }}">Описание</label>
    <textarea id="edit-description-{{ link.id }}" name="description" rows="3">{{ link.description or '' }}</textarea>

    <label for="edit-tags-{{ link.id }}">Теги (через запятую)</label>
    <input type="text" id="edit-tags-{{ link.id }}" name="tags" value="{{ link.tags|map(attribute='name')|join(', ') }}">

    <div class="edit-form-actions">
      <button type="submit">Сохранить</button>
      <button type="button" hx-get="/links/{{ link.id }}/card" hx-target="#link-{{ link.id }}" hx-swap="outerHTML">Отмена</button>
    </div>
  </form>
</div>
