<tr id="link-{{ link.id }}">
  <td colspan="10">
    <form class="edit-form" style="padding: 12px 4px;" hx-patch="/api/links/{{ link.id }}" hx-target="#link-{{ link.id }}" hx-swap="outerHTML">
      <label for="edit-title-{{ link.id }}">Title</label>
      <input type="text" id="edit-title-{{ link.id }}" name="title" value="{{ link.title or '' }}">

      <label for="edit-description-{{ link.id }}">Description</label>
      <textarea id="edit-description-{{ link.id }}" name="description" rows="3">{{ link.description or '' }}</textarea>

      <label for="edit-tags-{{ link.id }}">Tags (comma-separated)</label>
      <input type="text" id="edit-tags-{{ link.id }}" name="tags" value="{{ link.tags|map(attribute='name')|join(', ') }}">

      <label for="edit-area-{{ link.id }}">Area</label>
      <select id="edit-area-{{ link.id }}" name="area">
        {% for choice in area_choices %}
          <option value="{{ choice }}" {% if link.area == choice %}selected{% endif %}>{{ choice }}</option>
        {% endfor %}
      </select>

      <label for="edit-priority-{{ link.id }}">Priority</label>
      <select id="edit-priority-{{ link.id }}" name="priority">
        {% for choice in ["low", "normal", "high"] %}
          <option value="{{ choice }}" {% if link.manual_priority.value == choice %}selected{% endif %}>{{ choice|capitalize }}</option>
        {% endfor %}
      </select>

      <label style="display: flex; align-items: center; gap: 8px; flex-direction: row;">
        <input type="checkbox" name="tested" id="edit-tested-{{ link.id }}" {% if link.is_tested %}checked{% endif %} style="width: auto;">
        Tested
      </label>

      <div class="edit-form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" class="btn" hx-get="/links/{{ link.id }}/card" hx-target="#link-{{ link.id }}" hx-swap="outerHTML">Cancel</button>
      </div>
    </form>
  </td>
</tr>
