<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Nova-260{% endblock %}</title>
  <link rel="icon" href="/static/img/nova-260.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    :root {
      color-scheme: dark;

      --bg: #000000;
      --bg-elevated: #0c0c0c;
      --bg-elevated-hover: #151515;
      --ghost: rgba(244, 242, 236, 0.04);

      --text: #f4f2ec;
      --text-muted: rgba(244, 242, 236, 0.62);
      --text-faint: rgba(244, 242, 236, 0.4);

      --border: rgba(244, 242, 236, 0.14);
      --border-strong: rgba(244, 242, 236, 0.28);

      --ink: #191917;
      --accent: #ff5c45;
      --accent-active: #e04a35;
      --cyan: #00c9cf;
      --yellow: #f4d941;
      --green: #49f7a5;
      --lilac: #c8c2e8;
      --peach: #f8957b;

      --font-display: "Space Grotesk", Arial, sans-serif;
      --font-body: "IBM Plex Sans", Inter, Arial, sans-serif;
      --font-mono: "IBM Plex Mono", "Space Mono", monospace;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: -0.1px;
      max-width: 920px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }

    a { color: inherit; }

    h1, h2, h3 { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.5px; margin: 0; }
    h1 { font-size: 30px; letter-spacing: -1px; margin-bottom: 14px; }
    h2 { font-size: 16px; margin: 28px 0 12px; }

    .back-link { display: inline-block; font-size: 13px; color: var(--text-muted); text-decoration: none; margin-bottom: 20px; }
    .back-link:hover { color: var(--text); }

    .source-url { color: var(--text-muted); font-size: 14px; text-decoration: none; word-break: break-all; }
    .source-url:hover { color: var(--accent); }

    .sources-list { list-style: none; margin: 0; padding: 0; }
    .sources-list li { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); padding: 8px 0; border-bottom: 1px solid var(--border); }
    .sources-list li:last-child { border-bottom: none; }

    /* --- Unified button system --- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      padding: 7px 15px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
    }
    .btn:hover { border-color: var(--border-strong); color: var(--text); }
    .btn-primary {
      background: var(--accent);
      color: var(--ink);
      border-color: var(--accent);
      font-weight: 600;
    }
    .btn-primary:hover { background: var(--accent-active); border-color: var(--accent-active); color: var(--ink); }
    .btn:disabled { background: var(--bg-elevated); color: var(--text-faint); cursor: not-allowed; }

    .markdown-block { font-size: 14px; color: var(--text-muted); white-space: pre-wrap; font-family: var(--font-body); line-height: 1.6; }

    /* --- Header --- */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 67px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-mark { width: 34px; height: 34px; flex-shrink: 0; object-fit: contain; }
    .brand-name { font-family: var(--font-display); font-weight: 600; font-size: 19px; letter-spacing: -0.4px; }
    .site-nav { display: flex; gap: 24px; align-items: center; }
    .site-nav a { font-size: 13px; font-weight: 500; text-decoration: none; color: var(--text-muted); transition: color 120ms ease; }
    .site-nav a:hover, .site-nav a.active { color: var(--text); }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 8px;
    }

    /* --- Ask block --- */
    .ask-block { margin-bottom: 32px; }
    .ask-block form { display: flex; gap: 8px; }
    .ask-block input[type="text"] {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 13px 18px;
      border-radius: var(--radius-pill);
      font: inherit;
      font-size: 14px;
    }
    .ask-block input[type="text"]:focus { outline: none; border-color: var(--border-strong); }
    .ask-block input[type="text"]::placeholder { color: var(--text-faint); }
    .qa-answer { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-top: 12px; }
    .qa-answer p { margin: 0; }

    /* --- Standalone content block (digest entries, research report) --- */
    .card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 12px; }
    .card-title { font-family: var(--font-display); font-weight: 500; font-size: 17px; letter-spacing: -0.2px; }
    .card-meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); margin: 6px 0 10px; letter-spacing: 0.02em; }
    .card-actions { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    /* --- Panel (table-style list container) --- */
    .panel { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--bg-elevated); margin-bottom: 32px; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .panel-title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); }
    .panel-note { padding: 14px 20px; font-size: 13px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    .panel-empty { padding: 32px 20px; text-align: center; color: var(--text-faint); font-size: 14px; }

    /* --- Filters --- */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filters select {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }
    .filters select:focus { outline: none; border-color: var(--border-strong); }

    /* --- Colored tag dropdown --- */
    .tag-select { position: relative; }
    .tag-select summary {
      list-style: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      font-size: 13px;
    }
    .tag-select summary::-webkit-details-marker { display: none; }
    .tag-select summary:hover { border-color: var(--border-strong); }
    .tag-select .swatch { width: 9px; height: 9px; border-radius: 50%; background: var(--tag-color, var(--text-faint)); flex-shrink: 0; }
    .tag-select-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 10;
      min-width: 200px;
      max-height: 280px;
      overflow-y: auto;
      background: var(--bg-elevated-hover);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .tag-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
    }
    .tag-option:hover { background: var(--ghost); }
    .tag-option .swatch { width: 9px; height: 9px; border-radius: 50%; background: var(--tag-color, var(--text-faint)); flex-shrink: 0; }

    /* --- Row list (table-style) --- */
    .row-list { display: flex; flex-direction: column; }
    .row-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 16px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .row-item:last-child { border-bottom: none; }
    .row-item:hover { background: var(--ghost); }
    .row-main { min-width: 0; flex: 1 1 320px; }
    .row-title { font-family: var(--font-display); font-weight: 500; font-size: 16px; letter-spacing: -0.2px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
    .row-title a { text-decoration: underline; text-decoration-color: var(--border-strong); text-underline-offset: 3px; }
    .row-title a:hover { color: var(--accent); text-decoration-color: var(--accent); }
    .row-meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); margin: 6px 0 0; letter-spacing: 0.02em; }
    .row-desc { font-size: 13px; color: var(--text-muted); margin: 8px 0 0; }
    .row-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }

    .badge {
      display: inline-block;
      background: transparent;
      color: var(--green);
      border: 1px solid var(--green);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 2px 9px;
      border-radius: var(--radius-pill);
    }

    .tags { margin: 10px 0 0; display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      display: inline-block;
      background: var(--tag-color, var(--lilac));
      color: var(--ink);
      border-radius: var(--radius-pill);
      padding: 3px 11px;
      font-size: 12px;
      font-weight: 500;
    }
    .click-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }

    .edit-form { display: flex; flex-direction: column; gap: 8px; padding: 16px 20px; }
    .edit-form label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); }
    .edit-form input, .edit-form textarea {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: var(--radius-md);
      font: inherit;
      font-size: 14px;
      width: 100%;
      resize: vertical;
    }
    .edit-form input:focus, .edit-form textarea:focus { outline: none; border-color: var(--border-strong); }
    .edit-form-actions { display: flex; gap: 8px; margin-top: 4px; }

    .pagination { display: flex; gap: 4px; justify-content: center; margin-top: 16px; }
    .pagination a { text-decoration: none; color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; padding: 6px 10px; border-radius: var(--radius-sm); }
    .pagination a:hover { color: var(--text); background: var(--ghost); }

    .htmx-indicator { opacity: 0; transition: opacity 150ms ease-in; font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); align-self: center; }
    .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }

    pre { font-family: var(--font-body); }

    /* --- Version table (changelog page) --- */
    .version-table { width: 100%; border-collapse: collapse; }
    .version-table th { text-align: left; font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); font-weight: 500; padding: 10px 20px; border-bottom: 1px solid var(--border); }
    .version-table td { padding: 14px 20px; border-bottom: 1px solid var(--border); vertical-align: top; font-size: 13px; }
    .version-table tr:last-child td { border-bottom: none; }
    .version-table .v-num { font-family: var(--font-mono); font-weight: 500; color: var(--text); white-space: nowrap; }
    .version-table .v-date { font-family: var(--font-mono); color: var(--text-faint); white-space: nowrap; }
    .version-table ul { margin: 0; padding-left: 16px; color: var(--text-muted); }
    .version-table li { margin-bottom: 4px; }

    footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); letter-spacing: 0.04em; text-transform: uppercase; display: flex; gap: 16px; flex-wrap: wrap; }
    footer a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    footer a:hover { color: var(--accent-active); }

    @media (max-width: 520px) {
      body { padding: 0 16px 48px; }
      .site-header { flex-wrap: wrap; height: auto; padding: 14px 0; gap: 10px; }
      .brand-name { font-size: 17px; }
      .ask-block form { flex-direction: column; }
      .row-item { padding: 14px; }
      .row-actions { width: 100%; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="/" class="brand">
      <img class="brand-mark" src="/static/img/nova-260.png" alt="Nova-260">
      <span class="brand-name">NOVA-260</span>
    </a>
    <nav class="site-nav">
      <a href="/">Links</a>
      <a href="/daily-digest">Daily digest</a>
      <a href="/weekly-digest">Weekly digest</a>
    </nav>
  </header>
  {% block content %}{% endblock %}
  <footer>
    <span>Nova-260 · Team link collector</span>
    <span>Version <a href="/changelog">v{{ current_version }}</a></span>
  </footer>
</body>
</html>
