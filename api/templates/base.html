<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Link Collector{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 960px; margin: 0 auto; padding: 24px; line-height: 1.5; }
    header { margin-bottom: 24px; }
    header a { text-decoration: none; color: inherit; font-weight: 600; font-size: 1.2rem; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .filters input, .filters select { padding: 6px 10px; border-radius: 6px; border: 1px solid #8888; font: inherit; }
    .top-block { background: rgba(127,127,127,0.08); border-radius: 10px; padding: 12px 16px; margin-bottom: 24px; }
    .top-block h2 { margin: 0 0 8px; font-size: 1rem; }
    .card { border: 1px solid #8883; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
    .card-title { font-weight: 600; }
    .card-title a { color: inherit; }
    .card-meta { font-size: 0.85rem; opacity: 0.7; margin: 4px 0; }
    .badge { display: inline-block; background: #f59e0b; color: #111; font-size: 0.75rem; padding: 2px 8px; border-radius: 999px; margin-left: 6px; }
    .tags { margin: 6px 0; }
    .tag { display: inline-block; background: #8882; border-radius: 999px; padding: 2px 10px; font-size: 0.8rem; margin-right: 4px; }
    .card-actions { margin-top: 8px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .card-actions button { font-size: 0.8rem; padding: 4px 10px; border-radius: 6px; border: 1px solid #8886; background: transparent; cursor: pointer; font: inherit; }
    .tags-form { display: flex; gap: 6px; align-items: center; }
    .tags-form input { padding: 3px 8px; border-radius: 6px; border: 1px solid #8888; font-size: 0.8rem; }
    .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
    .pagination a { text-decoration: none; color: inherit; padding: 2px 6px; }
    .ask-block { margin-bottom: 24px; }
    .ask-block form { display: flex; gap: 8px; align-items: center; }
    .ask-block input[type="text"] { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #8888; font: inherit; }
    .ask-block button { padding: 8px 14px; border-radius: 6px; border: 1px solid #8886; background: transparent; cursor: pointer; font: inherit; }
    .qa-answer { background: rgba(127,127,127,0.08); border-radius: 10px; padding: 12px 16px; margin-top: 10px; }
    .qa-sources ul { margin: 4px 0 0; padding-left: 20px; }
    .htmx-indicator { opacity: 0; transition: opacity 150ms ease-in; font-size: 0.85rem; }
    .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }
  </style>
</head>
<body>
  <header style="display: flex; gap: 16px; align-items: baseline;">
    <a href="/">🔗 Link Collector</a>
    <a href="/collections" style="font-size: 0.9rem; opacity: 0.8;">Подборки</a>
  </header>
  {% block content %}{% endblock %}
</body>
</html>
