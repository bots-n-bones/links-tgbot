<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Nova-260{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23191917'/%3E%3Ccircle cx='50' cy='50' r='26' fill='none' stroke='%23ff5c45' stroke-width='9'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    :root {
      color-scheme: dark;

      --bg: #191917;
      --bg-elevated: #211f1c;
      --bg-elevated-hover: #28251f;
      --ghost: rgba(244, 242, 236, 0.04);

      --text: #f4f2ec;
      --text-muted: rgba(244, 242, 236, 0.62);
      --text-faint: rgba(244, 242, 236, 0.4);

      --border: rgba(244, 242, 236, 0.12);
      --border-strong: rgba(244, 242, 236, 0.24);

      --ink: #191917;
      --accent: #ff5c45;
      --accent-active: #e04a35;
      --cyan: #00c9cf;
      --yellow: #f4d941;
      --green: #49f7a5;
      --lilac: #c8c2e8;
      --peach: #f8957b;

      --font-display: "Space Grotesk", Arial, sans-serif;
      --font-body: "IBM Plex Sans", Inter, Arial, sans-serif;
      --font-mono: "IBM Plex Mono", "Space Mono", monospace;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: -0.1px;
      max-width: 880px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }

    a { color: inherit; }

    h1, h2, h3 { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.5px; margin: 0; }
    h1 { font-size: 30px; letter-spacing: -1px; margin-bottom: 14px; }
    h2 { font-size: 16px; margin: 28px 0 12px; }

    .back-link { display: inline-block; font-size: 13px; color: var(--text-muted); text-decoration: none; margin-bottom: 20px; }
    .back-link:hover { color: var(--text); }

    .source-url { color: var(--text-muted); font-size: 14px; text-decoration: none; word-break: break-all; }
    .source-url:hover { color: var(--accent); }

    .sources-list { list-style: none; margin: 0; padding: 0; }
    .sources-list li { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); padding: 8px 0; border-bottom: 1px solid var(--border); }
    .sources-list li:last-child { border-bottom: none; }

    .btn-primary {
      background: var(--accent);
      color: var(--ink);
      border: none;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      padding: 10px 20px;
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: background 120ms ease;
    }
    .btn-primary:hover { background: var(--accent-active); }
    .btn-primary:disabled { background: var(--bg-elevated); color: var(--text-faint); cursor: not-allowed; }

    .markdown-block { font-size: 14px; color: var(--text-muted); white-space: pre-wrap; font-family: var(--font-body); line-height: 1.6; }

    /* --- Header --- */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 67px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-mark { width: 12px; height: 12px; border-radius: 3px; background: var(--accent); flex-shrink: 0; }
    .brand-name { font-family: var(--font-display); font-weight: 600; font-size: 19px; letter-spacing: -0.4px; }
    .brand-tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-top: 1px; }
    .site-nav { display: flex; gap: 24px; align-items: center; }
    .site-nav a { font-size: 13px; font-weight: 500; text-decoration: none; color: var(--text-muted); transition: color 120ms ease; }
    .site-nav a:hover { color: var(--text); }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 8px;
    }

    /* --- Ask block --- */
    .ask-block { margin-bottom: 32px; }
    .ask-block form { display: flex; gap: 8px; }
    .ask-block input[type="text"] {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 13px 18px;
      border-radius: var(--radius-pill);
      font: inherit;
      font-size: 14px;
    }
    .ask-block input[type="text"]:focus { outline: none; border-color: var(--border-strong); }
    .ask-block input[type="text"]::placeholder { color: var(--text-faint); }
    .ask-block button {
      background: var(--accent);
      color: var(--ink);
      border: none;
      padding: 0 22px;
      border-radius: var(--radius-pill);
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 120ms ease;
    }
    .ask-block button:hover { background: var(--accent-active); }
    .qa-answer { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-top: 12px; }
    .qa-answer p { margin: 0; }
    .qa-sources { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .qa-sources strong { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); font-weight: 500; }
    .qa-sources ul { margin: 8px 0 0; padding-left: 18px; }
    .qa-sources li { margin-bottom: 4px; font-size: 14px; }

    /* --- Top block --- */
    .top-block { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 32px; }
    .top-block h2 { font-size: 15px; margin-bottom: 14px; }
    .top-row { display: flex; align-items: baseline; gap: 12px; padding: 6px 0; }
    .top-rank { font-family: var(--font-mono); font-size: 12px; color: var(--accent); min-width: 20px; }
    .top-row a { text-decoration: none; font-size: 14px; font-weight: 500; }
    .top-row a:hover { color: var(--accent); }

    /* --- Filters --- */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .filters input, .filters select {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      font: inherit;
      font-size: 13px;
    }
    .filters input:focus, .filters select:focus { outline: none; border-color: var(--border-strong); }
    .filters input::placeholder { color: var(--text-faint); }
    .filters select { cursor: pointer; }

    /* --- Cards --- */
    .card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 12px; transition: border-color 120ms ease; }
    .card:hover { border-color: var(--border-strong); }
    .card-title { font-family: var(--font-display); font-weight: 500; font-size: 17px; letter-spacing: -0.2px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
    .card-title a { text-decoration: none; }
    .card-title a:hover { color: var(--accent); }
    .card-meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); margin: 6px 0 10px; letter-spacing: 0.02em; }
    .card p { font-size: 14px; color: var(--text-muted); margin: 0 0 10px; }

    .badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 3px 9px;
      border-radius: var(--radius-pill);
    }

    .tags { margin: 0 0 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      display: inline-block;
      background: var(--tag-color, var(--lilac));
      color: var(--ink);
      border-radius: var(--radius-pill);
      padding: 3px 11px;
      font-size: 12px;
      font-weight: 500;
    }
    .click-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }

    .card-actions { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .card-actions > a { font-size: 13px; font-weight: 500; text-decoration: none; color: var(--text-muted); }
    .card-actions > a:hover { color: var(--text); }
    .card-actions button {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 120ms ease, color 120ms ease;
    }
    .card-actions button:hover { border-color: var(--border-strong); color: var(--text); }
    .edit-form { display: flex; flex-direction: column; gap: 8px; }
    .edit-form label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); }
    .edit-form input, .edit-form textarea {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: var(--radius-md);
      font: inherit;
      font-size: 14px;
      width: 100%;
      resize: vertical;
    }
    .edit-form input:focus, .edit-form textarea:focus { outline: none; border-color: var(--border-strong); }
    .edit-form-actions { display: flex; gap: 8px; margin-top: 4px; }
    .edit-form-actions button[type="submit"] {
      background: var(--accent); color: var(--ink); border: none; font-weight: 600;
    }
    .edit-form-actions button[type="submit"]:hover { background: var(--accent-active); }

    .similar-links { margin-top: 8px; }
    .similar-links a { display: block; font-size: 14px; text-decoration: none; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .similar-links a:last-child { border-bottom: none; }
    .similar-links a:hover { color: var(--accent); }
    .similar-empty { font-size: 13px; color: var(--text-faint); }

    .pagination { display: flex; gap: 4px; justify-content: center; margin-top: 20px; }
    .pagination a { text-decoration: none; color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; padding: 6px 10px; border-radius: var(--radius-sm); }
    .pagination a:hover { color: var(--text); background: var(--ghost); }

    .htmx-indicator { opacity: 0; transition: opacity 150ms ease-in; font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); align-self: center; }
    .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }

    pre { font-family: var(--font-body); }

    footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); letter-spacing: 0.04em; text-transform: uppercase; }

    @media (max-width: 520px) {
      body { padding: 0 16px 48px; }
      .site-header { flex-wrap: wrap; height: auto; padding: 14px 0; gap: 10px; }
      .brand-name { font-size: 17px; }
      .ask-block form { flex-direction: column; }
      .ask-block button { padding: 12px; }
      .tags-form input { width: 120px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="/" class="brand">
      <span class="brand-mark"></span>
      <span>
        <span class="brand-name">NOVA-260</span>
        <span class="brand-tag">Link intelligence</span>
      </span>
    </a>
    <nav class="site-nav">
      <a href="/">Ссылки</a>
      <a href="/collections">Подборки</a>
    </nav>
  </header>
  {% block content %}{% endblock %}
  <footer>Nova-260 · Team link collector</footer>
</body>
</html>
