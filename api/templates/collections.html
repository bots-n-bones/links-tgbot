{% extends "base.html" %}
{% block content %}
<div class="eyebrow">Weekly digest</div>
<h1>Подборки</h1>
{% for c in collections %}
  <div class="card">
    <div class="card-title">{{ c.title }}</div>
    <div class="card-meta">{{ c.period_start }} — {{ c.period_end }}</div>
    <div class="markdown-block">{{ c.summary_md }}</div>
  </div>
{% else %}
  <p>Подборок пока нет — первая соберётся автоматически по расписанию.</p>
{% endfor %}
{% endblock %}
