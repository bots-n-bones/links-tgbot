<div id="links-list">
{% for link in links %}
  {% include "_link_card.html" %}
{% else %}
  <p>Ничего не найдено.</p>
{% endfor %}

{% if total > page_size %}
{% set total_pages = ((total - 1) // page_size) + 1 %}
<div class="pagination">
  {% for p in range(1, total_pages + 1) %}
    <a href="#"
       hx-get="/partials/links?q={{ q or '' }}&tag={{ tag or '' }}&chat={{ chat or '' }}&sort={{ sort }}&page={{ p }}"
       hx-target="#links-list" hx-swap="outerHTML">{{ p }}{% if p == page %} ●{% endif %}</a>
  {% endfor %}
</div>
{% endif %}
</div>
